<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>@nextlief</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f0f0f;color:#fff;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;
    padding:48px 24px 32px;
    background:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 50%,#0f0f0f 100%)
  }
  .avatar{
    width:96px;height:96px;border-radius:50%;
    background:linear-gradient(135deg,#a855f7,#7c3aed);
    display:flex;align-items:center;justify-content:center;
    font-size:40px;font-weight:700;color:#fff;
    margin-bottom:16px;box-shadow:0 0 40px rgba(168,85,247,.3)
  }
  h1{font-size:24px;font-weight:700;margin-bottom:4px}
  .tag{color:#a1a1aa;font-size:14px;margin-bottom:24px}
  .links{width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px}
  .link{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
    border-radius:14px;padding:16px 20px;
    text-decoration:none;color:#fff;font-size:16px;font-weight:500;
    transition:all .2s;backdrop-filter:blur(8px)
  }
  .link:hover{background:rgba(168,85,247,.15);border-color:#a855f7;transform:translateY(-2px)}
  .link:active{transform:translateY(0)}
  .link .icon{font-size:24px;width:28px;text-align:center}
  .link .arrow{margin-left:auto;color:#52525b;font-size:18px}
  .link:hover .arrow{color:#a855f7}
  .footer{margin-top:32px;color:#52525b;font-size:12px}
</style>
</head>
<body>
  <div class="avatar">N</div>
  <h1>@nextlief</h1>
  <p class="tag">content creator &bull; psychology &bull; facts &bull; money</p>
  <div class="links">
    <a href="https://youtube.com/@nextlief" target="_blank" rel="noopener" class="link">
      <span class="icon">▶</span> YouTube
      <span class="arrow">→</span>
    </a>
    <a href="https://instagram.com/nextlief" target="_blank" rel="noopener" class="link">
      <span class="icon">📷</span> Instagram
      <span class="arrow">→</span>
    </a>
    <a href="https://t.me/nextlief" target="_blank" rel="noopener" class="link">
      <span class="icon">✈</span> Telegram
      <span class="arrow">→</span>
    </a>
    <a href="https://facebook.com/nextlief" target="_blank" rel="noopener" class="link">
      <span class="icon">f</span> Facebook
      <span class="arrow">→</span>
    </a>
    <a href="https://dailymotion.com/Nextlief" target="_blank" rel="noopener" class="link">
      <span class="icon">🎬</span> Dailymotion
      <span class="arrow">→</span>
    </a>
  </div>
  <p class="footer">nextlief &bull; all content</p>
</body>
</html>
